<!-- ExecutiveCalendarComponent — Module 7 | bg-[#101415] -->
<div class="min-h-screen flex flex-col" style="background:#101415; font-family:'Geist','Inter',ui-sans-serif,system-ui,sans-serif;">

  <!-- ══ TOP BAR ══ -->
  <header class="flex items-center justify-between px-8 py-4 border-b border-white/5 sticky top-0 z-10 bg-[#101415]/80 backdrop-blur-sm">
    <div class="flex items-center gap-3">
      <svg class="w-5 h-5 text-white/40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <h1 class="text-white font-bold text-base">Calendario Ejecutivo</h1>
    </div>
    <div class="flex items-center gap-3">
      <button (click)="openCreateModal()"
              class="flex items-center gap-2 bg-white text-gray-900 text-sm font-semibold rounded-xl px-4 py-2 hover:bg-gray-100 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Nueva reunión
      </button>
      <span class="text-white/30 text-xs font-semibold uppercase tracking-widest">LEAD MEET</span>
    </div>
  </header>

  <!-- ══ MAIN ══ -->
  <main class="flex-1 px-6 py-6 flex gap-5 max-w-[1200px] mx-auto w-full">

    <!-- ─── LEFT: Calendar grid (Task 3.1) ─── -->
    <div class="flex-1 flex flex-col gap-4">

      <!-- Month navigation -->
      <div class="flex items-center justify-between">
        <button (click)="prevMonth()"
                class="w-8 h-8 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors">
          <svg class="w-4 h-4 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>

        <h2 class="text-white font-bold text-lg tracking-tight">{{ currentMonthLabel }}</h2>

        <button (click)="nextMonth()"
                class="w-8 h-8 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors">
          <svg class="w-4 h-4 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>

      <!-- Day headers (Mon-first) -->
      <div class="grid grid-cols-7 mb-1">
        <div *ngFor="let h of dayHeaders"
             class="text-center text-white/20 text-[10px] font-bold uppercase tracking-widest py-2">
          {{ h }}
        </div>
      </div>

      <!-- Skeleton while loading -->
      <div *ngIf="loading" class="grid grid-cols-7 gap-1">
        <div *ngFor="let _ of [].constructor(42)"
             class="aspect-square rounded-xl bg-white/[0.03] animate-pulse"></div>
      </div>

      <!-- Calendar grid (Task 3.1) -->
      <div *ngIf="!loading" class="grid grid-cols-7 gap-1">
        <button
          *ngFor="let day of calendarDays"
          (click)="day.isCurrentMonth && selectDay(day.date)"
          class="min-h-[64px] flex flex-col items-center pt-2 pb-1.5 rounded-xl border transition-all relative"
          [ngClass]="{
            'bg-white border-white cursor-pointer': day.isSelected && day.isCurrentMonth,
            'bg-[#1d2022] border-white/5 cursor-pointer hover:border-white/20': !day.isSelected && day.isCurrentMonth && !day.isToday,
            'bg-[#1d2022] border-[#0055ff]/40 cursor-pointer hover:border-white/20': day.isToday && !day.isSelected,
            'bg-[#1d2022]/20 border-white/[0.02] cursor-default': !day.isCurrentMonth
          }">

          <!-- Day number -->
          <span class="text-sm font-bold leading-none mb-1.5"
                [ngClass]="{
                  'text-black': day.isSelected && day.isCurrentMonth,
                  'text-[#0055ff]': day.isToday && !day.isSelected,
                  'text-white': day.isCurrentMonth && !day.isToday && !day.isSelected,
                  'text-white/15': !day.isCurrentMonth
                }">
            {{ day.dayNum }}
          </span>

          <!-- Event pills (max 2 visible) -->
          <div class="flex flex-col gap-0.5 w-full px-1 mt-0.5">
            <div
              *ngFor="let ev of day.events.slice(0, 2)"
              class="w-full rounded-[4px] px-1 py-[1px] text-[8px] font-semibold leading-tight truncate"
              [ngClass]="{
                'bg-blue-600/80 text-blue-100': ev.type === 'strategy' && !day.isSelected,
                'bg-yellow-500/80 text-yellow-100': ev.type === 'negotiation' && !day.isSelected,
                'bg-purple-600/80 text-purple-100': ev.type === 'interview' && !day.isSelected,
                'bg-white/25 text-white/80': ev.type === 'general' && !day.isSelected,
                'bg-emerald-600/80 text-emerald-100': ev.type === 'clase' && !day.isSelected,
                'bg-black/20 text-black/70': day.isSelected
              }">
              {{ ev.title }}
            </div>
            <div *ngIf="day.events.length > 2"
                 class="text-[8px] font-bold leading-none pl-1"
                 [ngClass]="day.isSelected ? 'text-black/50' : 'text-white/30'">
              +{{ day.events.length - 2 }} más
            </div>
          </div>

        </button>
      </div>

      <!-- Legend -->
      <div class="flex items-center gap-3 flex-wrap mt-2 px-1">
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-sm bg-blue-600"></span>
          <span class="text-white/30 text-[9px] uppercase tracking-widest">Estrategia</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-sm bg-yellow-500"></span>
          <span class="text-white/30 text-[9px] uppercase tracking-widest">Negociación</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-sm bg-purple-600"></span>
          <span class="text-white/30 text-[9px] uppercase tracking-widest">Entrevista</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-sm bg-white/25"></span>
          <span class="text-white/30 text-[9px] uppercase tracking-widest">General</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-sm bg-emerald-600"></span>
          <span class="text-white/30 text-[9px] uppercase tracking-widest">Clase</span>
        </div>
      </div>
    </div>

    <!-- ─── RIGHT: Sidebar (Tasks 3.2, 3.3) ─── -->
    <div class="w-72 xl:w-80 flex flex-col gap-4 shrink-0">

      <!-- Daily agenda sidebar (Task 3.2) -->
      <div class="bg-[#1d2022] border border-white/5 rounded-2xl p-5 flex-1 flex flex-col gap-4 min-h-0">
        <app-daily-agenda-sidebar
          [selectedDate]="selectedDate"
          [meetings]="selectedMeetings"
          (schedule)="onSchedule()">
        </app-daily-agenda-sidebar>
      </div>

      <!-- Quick notes (Task 3.3) -->
      <app-quick-notes
        [content]="noteContent"
        [saving]="noteSaving"
        [saved]="noteSaved"
        (save)="onNoteSave($event)">
      </app-quick-notes>

    </div>

  </main>
</div>

<!-- Modal Nueva Reunión Programada -->
@if (showCreateModal) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4"
       style="background: rgba(0,0,0,0.75);"
       (click)="showCreateModal = false">
    <div class="w-full max-w-md rounded-2xl p-6"
         style="background:#181c1e; border:1px solid rgba(255,255,255,0.08);"
         (click)="$event.stopPropagation()">

      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold text-white">Programar reunión</h2>
        <button (click)="showCreateModal = false" class="text-white/30 hover:text-white transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="flex flex-col gap-4">
        <div>
          <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1.5">Título *</label>
          <input
            [(ngModel)]="newMeeting.title"
            type="text"
            placeholder="Reunión de estrategia Q3"
            class="w-full rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 outline-none"
            style="background:#1d2022; border:1px solid rgba(255,255,255,0.08);"
            onfocus="this.style.borderColor='rgba(0,85,255,0.5)'"
            onblur="this.style.borderColor='rgba(255,255,255,0.08)'"
          />
        </div>
        <div>
          <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1.5">Tipo</label>
          <select
            [(ngModel)]="newMeeting.type"
            class="w-full rounded-xl px-4 py-3 text-sm text-white outline-none"
            style="background:#1d2022; border:1px solid rgba(255,255,255,0.08);">
            @for (t of meetingTypes; track t.value) {
              <option [value]="t.value" style="background:#1d2022">{{ t.label }}</option>
            }
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1.5">Hora inicio *</label>
            <input
              [(ngModel)]="newMeeting.startTime"
              type="time"
              class="w-full rounded-xl px-3 py-3 text-sm text-white outline-none"
              style="background:#1d2022; border:1px solid rgba(255,255,255,0.08); color-scheme:dark;"
              onfocus="this.style.borderColor='rgba(0,85,255,0.5)'"
              onblur="this.style.borderColor='rgba(255,255,255,0.08)'"
            />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1.5">Hora fin *</label>
            <input
              [(ngModel)]="newMeeting.endTime"
              type="time"
              class="w-full rounded-xl px-3 py-3 text-sm text-white outline-none"
              style="background:#1d2022; border:1px solid rgba(255,255,255,0.08); color-scheme:dark;"
              onfocus="this.style.borderColor='rgba(0,85,255,0.5)'"
              onblur="this.style.borderColor='rgba(255,255,255,0.08)'"
            />
          </div>
        </div>
        <div>
          <label class="block text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1.5">Descripción</label>
          <textarea
            [(ngModel)]="newMeeting.description"
            placeholder="Descripción breve (opcional)"
            rows="2"
            class="w-full rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 outline-none resize-none"
            style="background:#1d2022; border:1px solid rgba(255,255,255,0.08);"
            onfocus="this.style.borderColor='rgba(0,85,255,0.5)'"
            onblur="this.style.borderColor='rgba(255,255,255,0.08)'"
          ></textarea>
        </div>
      </div>

      @if (createError) {
        <div class="mt-4 flex items-start gap-2 bg-red-500/10 border border-red-500/30 rounded-xl px-3 py-2.5">
          <svg class="w-4 h-4 text-red-400 shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          <p class="text-sm text-red-300">{{ createError }}</p>
        </div>
      }

      <div class="flex gap-2 mt-4">
        <button
          (click)="showCreateModal = false"
          class="flex-1 py-3 rounded-xl text-sm font-semibold text-white/50 hover:text-white transition-colors"
          style="background:rgba(255,255,255,0.05);">
          Cancelar
        </button>
        <button
          (click)="onCreateMeeting()"
          [disabled]="!newMeeting.title || !newMeeting.startTime || !newMeeting.endTime || creatingMeeting"
          class="flex-1 py-3 rounded-xl text-sm font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed"
          style="background:#0055ff; color:white;">
          @if (creatingMeeting) { Programando... } @else { Programar }
        </button>
      </div>
    </div>
  </div>
}
